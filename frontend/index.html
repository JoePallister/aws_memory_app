<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

  <h1>Flashcards</h1>

  <button id="login">Login with Cognito</button>

  <script>
    const domain = "https://flashcards-app-abcdefgh.auth.eu-north-1.amazoncognito.com";
    const clientId = "6i9g3v42m2r5asvsfi5qervrub";
    const redirectUri = "http://localhost:8000/callback.html";

    document.getElementById("login").addEventListener("click", () => {
      const url =
        `${domain}/login?` +
        `client_id=${clientId}` +
        `&response_type=code` +
        `&scope=openid+email+profile` +
        `&redirect_uri=${encodeURIComponent(redirectUri)}`;

      window.location.href = url;
    });
  </script>

</body>
</html>
