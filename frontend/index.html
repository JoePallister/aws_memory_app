<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anki Clone</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Anki Clone</h1>

    <section class="card">
      <h2>Create Card</h2>

      <form id="card-form">
        <div class="form-group">
          <label for="user_id">User ID</label>
          <input
            id="user_id"
            type="text"
            value="1"
            required
          />
        </div>

        <div class="form-group">
          <label for="front">Front</label>
          <input
            id="front"
            type="text"
            placeholder="e.g. What does 受 mean?"
            required
          />
        </div>

        <div class="form-group">
          <label for="back">Back</label>
          <textarea
            id="back"
            rows="4"
            placeholder="e.g. to receive"
            required
          ></textarea>
        </div>

        <button type="submit">Create Card</button>
      </form>
    </section>

    <section class="card">
      <h2>Response</h2>
      <pre id="status">No requests yet.</pre>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
