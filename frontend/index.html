<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <script src="constants.js"></script>
</head>
<body>

  <h1>Flashcards</h1>

  <button id="login">Login with Cognito</button>

  <script>
    const { COGNITO_DOMAIN: domain, CLIENT_ID: clientId, REDIRECT_URI: redirectUri } = window.CONSTANTS || {};

    document.getElementById("login").addEventListener("click", () => {
      const url =
        `${domain}/login?` +
        `client_id=${clientId}` +
        `&response_type=code` +
        `&scope=openid+email+profile` +
        `&redirect_uri=${encodeURIComponent(redirectUri)}`;

      window.location.href = url;
    });
  </script>

</body>
</html>
